[profile.default]
src = "contracts"
test = "contracts/test"
out = "out"
libs = ["lib", "../../node_modules"]
remappings = ["forge-std/=../../node_modules/forge-std/src/"]
optimizer = true
optimizer_runs = 200

[profile.ci]
via_ir = true

[rpc_endpoints]
localhost = "http://127.0.0.1:8545"
sepolia = "${SEPOLIA_RPC_URL}"
celoSepolia = "https://forno.celo-sepolia.celo-testnet.org/"
