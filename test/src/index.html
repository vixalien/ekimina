<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" />
    <script type="module" src="script.js"></script>

    <title>USSD Test</title>
  </head>
  <body>
    <main class="container">
      <h1>USSD Test</h1>
      <form>
        <fieldset>
          <label>
            Phone Number
            <input
              name="phone"
              placeholder="Phone Number"
              autocomplete="tel"
              value="+250788666655"
            />
          </label>
          <label>
            Callback URL
            <input
              type="url"
              name="url"
              placeholder="Callback URL"
              autocomplete="url"
              value="http://localhost:3000/ussd"
            />
          </label>

          <label>
            Service Code
            <input
              type="text"
              name="code"
              placeholder="Service Code"
              autocomplete="text"
              value="49035"
            />
          </label>
        </fieldset>

        <input type="button" value="Dial" onclick="sendRequest()" />
      </form>
    </main>

    <dialog id="dialog">
      <article>
        <p id="dialogText" style="white-space: pre"></p>
        <footer>
          <input type="text" id="dialogInput" autocomplete="off" data-bwignore />
          <button id="cancelButton">Cancel</button>
          <button id="dialogButton" onclick="proceed()">OK</button>
        </footer>
      </article>
    </dialog>
  </body>
</html>
